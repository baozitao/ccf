<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222235;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>

  <!-- Accent line at bottom -->
  <rect x="0" y="196" width="800" height="4" fill="#4f8ef7" opacity="0.7" rx="2"/>

  <!-- Sparkle/star icon to the left of CCF -->
  <!-- Star shape centered at ~260, 95 -->
  <g transform="translate(258, 95)" filter="url(#glow)">
    <!-- 4-point sparkle star -->
    <polygon points="0,-22 5,-5 22,0 5,5 0,22 -5,5 -22,0 -5,-5"
             fill="#7eb8f7" opacity="0.9"/>
    <!-- Small center circle -->
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.95"/>
    <!-- Tiny sparkle dots -->
    <circle cx="28" cy="-18" r="2" fill="#aed4ff" opacity="0.7"/>
    <circle cx="-30" cy="20" r="1.5" fill="#aed4ff" opacity="0.5"/>
    <circle cx="32" cy="16" r="1" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- CCF main text -->
  <text x="400" y="110"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, Arial, sans-serif"
        font-size="80"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="8"
        filter="url(#subtleglow)">CCF</text>

  <!-- Subtitle text -->
  <text x="400" y="148"
        font-family="'Segoe UI', 'SF Pro Text', -apple-system, Arial, sans-serif"
        font-size="18"
        font-weight="400"
        fill="#8bafd4"
        text-anchor="middle"
        letter-spacing="4">Claude Code Floating</text>

  <!-- Decorative dots row -->
  <g fill="#4f8ef7" opacity="0.4">
    <circle cx="340" cy="168" r="2"/>
    <circle cx="354" cy="168" r="2"/>
    <circle cx="368" cy="168" r="2"/>
    <circle cx="400" cy="168" r="3" opacity="0.6"/>
    <circle cx="432" cy="168" r="2"/>
    <circle cx="446" cy="168" r="2"/>
    <circle cx="460" cy="168" r="2"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="520" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">CCF Architecture</text>

  <!-- Desktop Layer -->
  <rect x="30" y="55" width="200" height="100" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="130" y="75" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">DESKTOP</text>
  <rect x="45" y="85" width="170" height="24" rx="6" fill="#f59e0b22"/>
  <text x="130" y="101" text-anchor="middle" fill="#fbbf24" font-size="11">Floating Window (Top)</text>
  <rect x="45" y="115" width="170" height="24" rx="6" fill="#f59e0b22"/>
  <text x="130" y="131" text-anchor="middle" fill="#fbbf24" font-size="11">System Tray</text>

  <!-- Electron Main Process -->
  <rect x="270" y="55" width="350" height="130" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="445" y="75" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="700">ELECTRON MAIN PROCESS</text>
  <rect x="285" y="85" width="100" height="24" rx="6" fill="#6366f122"/>
  <text x="335" y="101" text-anchor="middle" fill="#a5b4fc" font-size="10">IPC Bridge</text>
  <rect x="395" y="85" width="100" height="24" rx="6" fill="#ef444422"/>
  <text x="445" y="101" text-anchor="middle" fill="#fca5a5" font-size="10">HTTP Toggle</text>
  <rect x="505" y="85" width="100" height="24" rx="6" fill="#6366f122"/>
  <text x="555" y="101" text-anchor="middle" fill="#a5b4fc" font-size="10">Control Plane</text>
  <rect x="285" y="118" width="100" height="24" rx="6" fill="#6366f122"/>
  <text x="335" y="134" text-anchor="middle" fill="#a5b4fc" font-size="10">node-pty</text>
  <rect x="395" y="118" width="100" height="24" rx="6" fill="#10b98122"/>
  <text x="445" y="134" text-anchor="middle" fill="#6ee7b7" font-size="10">Permission</text>
  <rect x="505" y="118" width="100" height="24" rx="6" fill="#6366f122"/>
  <text x="555" y="134" text-anchor="middle" fill="#a5b4fc" font-size="10">Drag Polling</text>
  <text x="445" y="172" text-anchor="middle" fill="#475569" font-size="9">:19836 (permissions) · :19850 (toggle)</text>

  <!-- External -->
  <rect x="660" y="55" width="210" height="130" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="765" y="75" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">EXTERNAL</text>
  <rect x="675" y="85" width="180" height="24" rx="6" fill="#10b98122"/>
  <text x="765" y="101" text-anchor="middle" fill="#6ee7b7" font-size="11">Claude Code CLI</text>
  <rect x="675" y="115" width="85" height="24" rx="6" fill="#10b98122"/>
  <text x="717" y="131" text-anchor="middle" fill="#6ee7b7" font-size="10">Whisper</text>
  <rect x="770" y="115" width="85" height="24" rx="6" fill="#10b98122"/>
  <text x="812" y="131" text-anchor="middle" fill="#6ee7b7" font-size="10">Screenshot</text>
  <rect x="675" y="145" width="180" height="24" rx="6" fill="#f59e0b22"/>
  <text x="765" y="161" text-anchor="middle" fill="#fbbf24" font-size="10">GNOME F3 Keybinding</text>

  <!-- Renderer -->
  <rect x="30" y="210" width="840" height="280" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="232" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="700">RENDERER — React + Tailwind CSS</text>

  <!-- Tab Strip -->
  <rect x="50" y="248" width="800" height="40" rx="8" fill="#0f172a"/>
  <rect x="58" y="255" width="80" height="26" rx="13" fill="#f59e0b33" stroke="#f59e0b" stroke-width="1"/>
  <text x="98" y="272" text-anchor="middle" fill="#fbbf24" font-size="10">Chat</text>
  <rect x="145" y="255" width="120" height="26" rx="13" fill="#ffffff11"/>
  <text x="205" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">Session 2</text>
  <rect x="272" y="255" width="120" height="26" rx="13" fill="#ffffff11"/>
  <text x="332" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">Session 3</text>
  <text x="790" y="272" text-anchor="middle" fill="#64748b" font-size="14">+ ⏱ ⚙</text>

  <!-- Conversation View -->
  <rect x="50" y="298" width="530" height="140" rx="8" fill="#0f172a"/>
  <text x="315" y="320" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600">Conversation View</text>
  <rect x="280" y="330" width="280" height="22" rx="4" fill="#1e293b"/>
  <text x="420" y="345" text-anchor="middle" fill="#e2e8f0" font-size="9">User: Check what software needs updating</text>
  <rect x="70" y="358" width="350" height="22" rx="4" fill="#1e293b"/>
  <text x="245" y="373" text-anchor="middle" fill="#94a3b8" font-size="9">AI: Let me check your system packages...</text>
  <rect x="70" y="386" width="280" height="38" rx="6" fill="#7c2d1233" stroke="#ef4444" stroke-width="0.5"/>
  <text x="210" y="401" text-anchor="middle" fill="#fca5a5" font-size="9">Permission Required: sudo apt update</text>
  <text x="150" y="416" text-anchor="middle" fill="#10b981" font-size="9">[Allow]</text>
  <text x="210" y="416" text-anchor="middle" fill="#ef4444" font-size="9">[Deny]</text>

  <!-- Side Panels -->
  <rect x="590" y="298" width="270" height="65" rx="8" fill="#0f172a"/>
  <text x="725" y="318" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Skills Marketplace</text>
  <text x="725" y="335" text-anchor="middle" fill="#64748b" font-size="9">Install plugins with one click</text>
  <text x="725" y="350" text-anchor="middle" fill="#475569" font-size="8">Design · Code · Analysis · Docs</text>

  <rect x="590" y="370" width="130" height="68" rx="8" fill="#0f172a"/>
  <text x="655" y="390" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">Session History</text>
  <text x="655" y="406" text-anchor="middle" fill="#64748b" font-size="9">Rename / Delete</text>
  <text x="655" y="420" text-anchor="middle" fill="#64748b" font-size="9">Resume anytime</text>

  <rect x="730" y="370" width="130" height="68" rx="8" fill="#0f172a"/>
  <text x="795" y="390" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="600">Theme Engine</text>
  <text x="795" y="406" text-anchor="middle" fill="#64748b" font-size="9">Light / Dark</text>
  <text x="795" y="420" text-anchor="middle" fill="#64748b" font-size="9">Auto switch</text>

  <!-- Input Bar -->
  <rect x="50" y="448" width="800" height="36" rx="18" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="400" y="470" text-anchor="middle" fill="#475569" font-size="11">Ask Claude Code anything...</text>
  <circle cx="810" cy="466" r="12" fill="#6366f122" stroke="#6366f1" stroke-width="1"/>
  <text x="810" y="470" text-anchor="middle" fill="#6366f1" font-size="10">🎤</text>

  <!-- Three circles -->
  <circle cx="30" cy="466" r="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="30" y="470" text-anchor="middle" fill="#64748b" font-size="8">📎</text>
  <circle cx="12" cy="466" r="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="12" y="470" text-anchor="middle" fill="#64748b" font-size="8">📷</text>

  <!-- Connection arrows (simplified lines) -->
  <line x1="230" y1="120" x2="270" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="620" y1="120" x2="660" y2="120" stroke="#6366f1" stroke-width="1" stroke-dasharray="4"/>
  <line x1="445" y1="185" x2="445" y2="210" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Labels -->
  <text x="250" y="116" text-anchor="middle" fill="#475569" font-size="8" transform="rotate(-90 250 116)">IPC</text>
  <text x="640" y="116" text-anchor="middle" fill="#475569" font-size="8" transform="rotate(-90 640 116)">PTY</text>
</svg>
